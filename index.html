<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Haichao Zhang's research blog and homepage.">
<title>Haichao Zhang</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="page">
  <header>
    <div class="topline">
      <h1><a class="site-title" href="./">Haichao Zhang</a></h1>
      <nav aria-label="Primary">
        <a href="#posts">Posts</a>
        <a href="#about">About</a>
        <a href="https://sites.google.com/site/hczhang1/home">More</a>
      </nav>
    </div>
    <p class="intro">Research notes and results in robotics, learning and AI.</p>
  </header>

  <main>
    <section id="posts" aria-labelledby="posts-title">
      <h2 class="section-title" id="posts-title">Posts</h2>
      <ul class="post-list" id="postList">
        <li class="empty">Loading posts...</li>
      </ul>
    </section>

    <section id="about" aria-labelledby="about-title">
      <h2 class="section-title" id="about-title">About</h2>
      <p>I work on robotics and embodied AI.</p>
      <p><a href="https://sites.google.com/site/hczhang1/home">More</a></p>
    </section>
  </main>

  <footer>
    &copy; <span id="year"></span> Haichao Zhang.
  </footer>
</div>

<script src="posts/manifest.js"></script>
<script>
const postList = document.getElementById("postList");

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatDate(value) {
  return new Intl.DateTimeFormat("en", {
    year: "numeric",
    month: "short",
    day: "numeric"
  }).format(new Date(`${value}T00:00:00`));
}

function sortedPosts() {
  return [...(window.BLOG_POSTS || [])].sort((a, b) => b.date.localeCompare(a.date));
}

function renderPostList() {
  if (!Array.isArray(window.BLOG_POSTS)) {
    postList.innerHTML = '<li class="empty">Could not load posts/manifest.js. Make sure it is committed and pushed with the posts directory.</li>';
    return;
  }

  const posts = sortedPosts();
  if (!posts.length) {
    postList.innerHTML = '<li class="empty">No posts yet.</li>';
    return;
  }

  postList.innerHTML = posts.map((post) => `
    <li class="post-item">
      <time class="post-date" datetime="${escapeHtml(post.date)}">${formatDate(post.date)}</time>
      <div>
        <div class="post-title"><a href="post.html?post=${encodeURIComponent(post.slug)}">${escapeHtml(post.title)}</a></div>
        <p class="post-summary">${escapeHtml(post.summary)}</p>
        <div class="post-tags">
          ${(post.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
        </div>
      </div>
    </li>
  `).join("");
}

document.getElementById("year").textContent = new Date().getFullYear();
renderPostList();
</script>
</body>
</html>
