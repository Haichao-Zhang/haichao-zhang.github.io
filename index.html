<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Haichao Zhang's research blog and homepage.">
<title>Haichao Zhang</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="page">
  <header>
    <div class="topline">
      <h1><a class="site-title" href="./">Haichao Zhang</a></h1>
      <nav aria-label="Primary">
        <a href="#posts">Posts</a>
        <a href="#about">About</a>
        <a href="https://sites.google.com/site/hczhang1/home">More</a>
      </nav>
    </div>
    <p class="intro">Research notes and results in robotics and AI.</p>
  </header>

  <main>
    <section id="posts" aria-labelledby="posts-title">
      <h2 class="section-title" id="posts-title">Posts</h2>
      <ul class="post-list" id="postList">
        <li class="empty">Loading posts...</li>
      </ul>
    </section>

    <section id="about" aria-labelledby="about-title">
      <h2 class="section-title" id="about-title">About</h2>
      <p>I work on robotics and embodied AI.</p>
      <p><a href="https://sites.google.com/site/hczhang1/home">More</a></p>
    </section>
  </main>

  <footer>
    &copy; <span id="year"></span> Haichao Zhang.
  </footer>
</div>

<script src="posts/manifest.js"></script>
<script src="assets/blog.js"></script>
<script>
const postList = document.getElementById("postList");

function renderPostList(posts) {
  if (!posts.length) {
    postList.innerHTML = '<li class="empty">No posts yet.</li>';
    return;
  }

  postList.innerHTML = posts.map((post) => `
    <li class="post-item">
      <time class="post-date" datetime="${Blog.escapeHtml(post.date)}">${Blog.formatDate(post.date)}</time>
      <div>
        <div class="post-title"><a href="post.html?post=${encodeURIComponent(post.slug)}">${Blog.escapeHtml(post.title)}</a></div>
        <p class="post-summary">${Blog.escapeHtml(post.summary)}</p>
        <div class="post-tags">
          ${(post.tags || []).map((tag) => `<span class="tag">${Blog.escapeHtml(tag)}</span>`).join("")}
        </div>
      </div>
    </li>
  `).join("");
}

document.getElementById("year").textContent = new Date().getFullYear();
Blog.loadPosts()
  .then(renderPostList)
  .catch((error) => {
    postList.innerHTML = `<li class="empty">${Blog.escapeHtml(error.message)}. Make sure the manifest and Markdown files are committed and pushed.</li>`;
  });
</script>
</body>
</html>
