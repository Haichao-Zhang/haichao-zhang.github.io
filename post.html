<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Haichao Zhang's research blog post.">
<title>Post | Haichao Zhang</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="page">
  <header>
    <div class="topline">
      <h1><a class="site-title" href="./">Haichao Zhang</a></h1>
      <nav aria-label="Primary">
        <a href="./#posts">Posts</a>
        <a href="./#about">About</a>
        <a href="https://sites.google.com/site/hczhang1/home">More</a>
      </nav>
    </div>
    <p class="intro">Research notes and results in robotics and AI.</p>
  </header>

  <main>
    <article class="post" id="reader" aria-live="polite">
      <p class="empty">Loading post...</p>
    </article>
  </main>

  <footer>
    &copy; <span id="year"></span> Haichao Zhang.
  </footer>
</div>

<script src="posts/manifest.js"></script>
<script src="assets/blog.js"></script>
<script>
const reader = document.getElementById("reader");

function requestedSlug() {
  const params = new URLSearchParams(window.location.search);
  return params.get("post") || window.location.hash.replace("#", "");
}

async function loadPost() {
  const posts = await Blog.loadPosts();
  const post = posts.find((item) => item.slug === requestedSlug());
  if (!post) {
    reader.innerHTML = '<p class="empty">Post not found. <a href="./#posts">Back to posts</a></p>';
    return;
  }

  document.title = `${post.title} | Haichao Zhang`;
  reader.innerHTML = `
    <p class="post-date">${Blog.formatDate(post.date)}</p>
    <h2>${Blog.escapeHtml(post.title)}</h2>
    <p class="post-summary">${Blog.escapeHtml(post.summary)}</p>
    <div class="post-tags">
      ${(post.tags || []).map((tag) => `<span class="tag">${Blog.escapeHtml(tag)}</span>`).join("")}
    </div>
    <div class="post-body">${Blog.markdownToHtml(post.body)}</div>
    <p class="post-nav"><a href="./#posts">Back to posts</a></p>
  `;
}

document.getElementById("year").textContent = new Date().getFullYear();
loadPost().catch((error) => {
  reader.innerHTML = `<p class="empty">${Blog.escapeHtml(error.message)}. Make sure the manifest and Markdown files are committed and pushed.</p>`;
});
</script>
</body>
</html>
