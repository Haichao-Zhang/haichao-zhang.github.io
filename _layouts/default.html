<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

  <header>
    <div class="topline">

        <a href="{{ '/#about' | relative_url }}">About</a>

</div>
