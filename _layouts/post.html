---
layout: default
---

<article class="post">
  <p class="post-date">{{ page.date | date: "%b %-d, %Y" }}</p>
  <h2>{{ page.title }}</h2>
  {% if page.summary %}
    <p class="post-summary">{{ page.summary }}</p>
  {% endif %}
  {% if page.tags.size > 0 %}
    <div class="post-tags">
      {% for tag in page.tags %}
        <span class="tag">{{ tag }}</span>
      {% endfor %}
    </div>
  {% endif %}
  <div class="post-body">
    {{ content }}
  </div>
  <p class="post-nav"><a href="{{ '/#posts' | relative_url }}">Back to posts</a></p>
</article>
